<?xml version="1.0" encoding="UTF-8"?>
<svg width="100%" viewBox="0 0 680 470" role="img" xmlns="http://www.w3.org/2000/svg"><title>Árbol de diagnóstico de problemas</title>
<text x="340" y="35" font-family="serif" font-size="17" fill="#1A1A1A" text-anchor="middle" font-weight="500">Árbol de diagnóstico de problemas</text>
<text x="340" y="55" font-family="sans-serif" font-size="11" fill="#5F5E5A" text-anchor="middle" font-style="italic">Cuando algo va mal, empieza aquí</text>
<rect x="40" y="75" width="600" height="380" rx="10" fill="#F5F1E8" stroke="#2D5F3F" stroke-width="0.5"/><rect x="200" y="95" width="280" height="50" rx="6" fill="#2D5F3F"/><text x="340" y="120" font-family="serif" font-size="14" fill="#F5F1E8" text-anchor="middle" font-weight="500">¿Qué le pasa a mi planta?</text><text x="340" y="135" font-family="sans-serif" font-size="10" fill="#C9A961" text-anchor="middle">Mira qué parte está afectada</text><line x1="340" y1="145" x2="340" y2="170" stroke="#2D5F3F" stroke-width="2"/><line x1="340" y1="170" x2="120" y2="170" stroke="#2D5F3F" stroke-width="2"/><line x1="340" y1="170" x2="560" y2="170" stroke="#2D5F3F" stroke-width="2"/><line x1="120" y1="170" x2="120" y2="200" stroke="#2D5F3F" stroke-width="2"/><line x1="340" y1="170" x2="340" y2="200" stroke="#2D5F3F" stroke-width="2"/><line x1="560" y1="170" x2="560" y2="200" stroke="#2D5F3F" stroke-width="2"/><rect x="50" y="200" width="140" height="80" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/><text x="120" y="225" font-family="sans-serif" font-size="12" fill="#854F0B" text-anchor="middle" font-weight="500">Hojas afectadas</text><text x="120" y="245" font-family="sans-serif" font-size="10" fill="#1A1A1A" text-anchor="middle">→ Capítulo 18</text><text x="120" y="262" font-family="sans-serif" font-size="9" fill="#5F5E5A" text-anchor="middle">Amarillo, manchas,</text><text x="120" y="275" font-family="sans-serif" font-size="9" fill="#5F5E5A" text-anchor="middle">marchitez</text><rect x="270" y="200" width="140" height="80" rx="6" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/><text x="340" y="225" font-family="sans-serif" font-size="12" fill="#A32D2D" text-anchor="middle" font-weight="500">Plagas visibles</text><text x="340" y="245" font-family="sans-serif" font-size="10" fill="#1A1A1A" text-anchor="middle">→ Capítulo 19</text><text x="340" y="262" font-family="sans-serif" font-size="9" fill="#5F5E5A" text-anchor="middle">Pulgones, mosca blanca,</text><text x="340" y="275" font-family="sans-serif" font-size="9" fill="#5F5E5A" text-anchor="middle">arañas, orugas</text><rect x="490" y="200" width="140" height="80" rx="6" fill="#EAF3DE" stroke="#27500A" stroke-width="0.5"/><text x="560" y="225" font-family="sans-serif" font-size="12" fill="#27500A" text-anchor="middle" font-weight="500">Raíces afectadas</text><text x="560" y="245" font-family="sans-serif" font-size="10" fill="#1A1A1A" text-anchor="middle">→ Capítulo 20</text><text x="560" y="262" font-family="sans-serif" font-size="9" fill="#5F5E5A" text-anchor="middle">Pythium, podredumbre,</text><text x="560" y="275" font-family="sans-serif" font-size="9" fill="#5F5E5A" text-anchor="middle">olor desagradable</text><rect x="100" y="320" width="480" height="120" rx="6" fill="#F5F1E8" stroke="#5F5E5A" stroke-width="0.5"/><text x="340" y="345" font-family="serif" font-size="13" fill="#1A1A1A" text-anchor="middle" font-weight="500">Cómo usar este diagnóstico</text><text x="120" y="370" font-family="sans-serif" font-size="11" fill="#5F5E5A">1. Identifica QUÉ parte de la planta está afectada</text><text x="120" y="390" font-family="sans-serif" font-size="11" fill="#5F5E5A">2. Ve al capítulo correspondiente</text><text x="120" y="410" font-family="sans-serif" font-size="11" fill="#5F5E5A">3. Compara con las imágenes de cada problema</text><text x="120" y="430" font-family="sans-serif" font-size="11" fill="#5F5E5A">4. Aplica la solución indicada</text>
</svg>