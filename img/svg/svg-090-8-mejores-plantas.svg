<?xml version="1.0" encoding="UTF-8"?>
<svg width="100%" viewBox="0 0 680 670" role="img" xmlns="http://www.w3.org/2000/svg"><title>Las 8 plantas perfectas para empezar</title>
<text x="340" y="35" font-family="serif" font-size="17" fill="#1A1A1A" text-anchor="middle" font-weight="500">Las 8 plantas perfectas para empezar</text>
<text x="340" y="55" font-family="sans-serif" font-size="11" fill="#5F5E5A" text-anchor="middle" font-style="italic">Fáciles, rápidas y con alta tasa de éxito</text>
