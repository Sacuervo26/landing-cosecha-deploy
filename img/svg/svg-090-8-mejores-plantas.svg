 font-size="10" fill="#5F5E5A" text-anchor="middle">EC 0.8-1.2</text><text x="145" y="118" font-family="sans-serif" font-size="11" fill="#27500A" text-anchor="middle" font-weight="500">⭐⭐⭐⭐</text></g><g transform="translate(350, 220)"><rect x="0" y="0" width="290" height="130" rx="8" fill="#F5F1E8" stroke="#2D5F3F" stroke-width="0.4"/><text x="145" y="35" font-family="serif" font-size="14" fill="#2D5F3F" text-anchor="middle" font-weight="500">Espinaca</text><text x="145" y="55" font-family="sans-serif" font-size="10" fill="#5F5E5A" text-anchor="middle">40-50 días</text><text x="145" y="71" font-family="sans-serif" font-size="10" fill="#5F5E5A" text-anchor="middle">pH 6.0-7.0</text><text x="145" y="87" font-family="sans-serif" font-size="10" fill="#5F5E5A" text-anchor="middle">EC 1.8-2.3</text><text x="145" y="118" font-family="sans-serif" font-size="11" fill="#27500A" text-anchor="middle" font-weight="500">⭐⭐⭐⭐</text></g><g transform="translate(40, 365)"><rect x="0" y="0" width="290" height="130" rx="8" fill="#F5F1E8" stroke="#2D5F3F" stroke-width="0.4"/><text x="145" y="35" font-family="serif" font-size="14" fill="#2D5F3F" text-anchor="middle" font-weight="500">Cilantro</text><text x="145" y="55" font-family="sans-serif" font-size="10" fill="#5F5E5A" text-anchor="middle">28-40 días</text><text x="145" y="71" font-family="sans-serif" font-size="10" fill="#5F5E5A" text-anchor="middle">pH 6.0-6.7</text><text x="145" y="87" font-family="sans-serif" font-size="10" fill="#5F5E5A" text-anchor="middle">EC 1.2-1.8</text><text x="145" y="118" font-family="sans-serif" font-size="11" fill="#27500A" text-anchor="middle" font-weight="500">⭐⭐⭐⭐</text></g><g transform="translate(350, 365)"><rect x="0" y="0" width="290" height="130" rx="8" fill="#F5F1E8" stroke="#2D5F3F" stroke-width="0.4"/><text x="145" y="35" font-family="serif" font-size="14" fill="#2D5F3F" text-anchor="middle" font-weight="500">Perejil</text><text x="145" y="55" font-family="sans-serif" font-size="10" fill="#5F