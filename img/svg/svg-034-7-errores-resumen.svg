<?xml version="1.0" encoding="UTF-8"?>
<svg width="100%" viewBox="0 0 680 480" role="img" xmlns="http://www.w3.org/2000/svg"><title>Los 7 errores fatales</title>
<text x="340" y="35" font-family="serif" font-size="17" fill="#1A1A1A" text-anchor="middle" font-weight="500">Los 7 errores que matan tus plantas</text>
<text x="340" y="55" font-family="sans-serif" font-size="11" fill="#5F5E5A" text-anchor="middle" font-style="italic">El 80% que fracasa cae en al menos 3 de estos</text>

<g transform="translate(40, 75)"><rect x="0" y="0" width="195" height="125" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.4"/><circle cx="30" cy="30" r="15" fill="#A32D2D"/><text x="30" y="36" font-family="serif" font-size="16" fill="#F5F1E8" text-anchor="middle" font-weight="500">1</text><text x="55" y="36" font-family="sans-serif" font-size="12" fill="#1A1A1A" font-weight="500">No medir el pH</text><text x="20" y="65" font-family="sans-serif" font-size="10" fill="#5F5E5A">Las raíces no absorben</text><text x="20" y="80" font-family="sans-serif" font-size="10" fill="#5F5E5A">aunque haya nutrientes</text><text x="20" y="105" font-family="sans-serif" font-size="10" fill="#A32D2D" font-weight="500">→ Hojas amarillas en 7 días</text></g>

<g transform="translate(245, 75)"><rect x="0" y="0" width="195" height="125" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.4"/><circle cx="30" cy="30" r="15" fill="#A32D2D"/><text x="30" y="36" font-family="serif" font-size="16" fill="#F5F1E8" text-anchor="middle" font-weight="500">2</text><text x="55" y="36" font-family="sans-serif" font-size="12" fill="#1A1A1A" font-weight="500">EC fuera de rango</text><text x="20" y="65" font-family="sans-serif" font-size="10" fill="#5F5E5A">Muy alto: planta quemada</text><text x="20" y="80" font-family="sans-serif" font-size="10" fill="#5F5E5A">Muy bajo: planta hambrienta</text><text x="20" y="105" font-family="sans-serif" font-size="10" fill="#A32D2D" font-weight="500">→ Bordes secos o crecimiento lento</text></g>

<g transform="translate(450, 75)"><rect x="0" y="0" width="195" height="125" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.4"/><circle cx="30" cy="30" r="15" fill="#A32D2D"/><text x="30" y="36" font-family="serif" font-size="16" fill="#F5F1E8" text-anchor="middle" font-weight="500">3</text><text x="55" y="36" font-family="sans-serif" font-size="12" fill="#1A1A1A" font-weight="500">Raíces sin oxígeno</text><text x="20" y="65" font-family="sans-serif" font-size="10" fill="#5F5E5A">DWC sin bomba de aire,</text><text x="20" y="80" font-family="sans-serif" font-size="10" fill="#5F5E5A">agua estancada</text><text x="20" y="105" font-family="sans-serif" font-size="10" fill="#A32D2D" font-weight="500">→ Raíces cafés y podridas</text></g>

<g transform="translate(40, 210)"><rect x="0" y="0" width="195" height="125" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.4"/><circle cx="30" cy="30" r="15" fill="#A32D2D"/><text x="30" y="36" font-family="serif" font-size="16" fill="#F5F1E8" text-anchor="middle" font-weight="500">4</text><text x="55" y="36" font-family="sans-serif" font-size="12" fill="#1A1A1A" font-weight="500">Luz insuficiente</text><text x="20" y="65" font-family="sans-serif" font-size="10" fill="#5F5E5A">Menos de 12h al día,</text><text x="20" y="80" font-family="sans-serif" font-size="10" fill="#5F5E5A">o ventana mal orientada</text><text x="20" y="105" font-family="sans-serif" font-size="10" fill="#A32D2D" font-weight="500">→ Tallos largos, hojas pálidas</text></g>

<g transform="translate(245, 210)"><rect x="0" y="0" width="195" height="125" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.4"/><circle cx="30" cy="30" r="15" fill="#A32D2D"/><text x="30" y="36" font-family="serif" font-size="16" fill="#F5F1E8" text-anchor="middle" font-weight="500">5</text><text x="55" y="36" font-family="sans-serif" font-size="12" fill="#1A1A1A" font-weight="500">Temperatura mala</text><text x="20" y="65" font-family="sans-serif" font-size="10" fill="#5F5E5A">Solución a +28°C =</text><text x="20" y="80" font-family="sans-serif" font-size="10" fill="#5F5E5A">caldo de cultivo de hongos</text><text x="20" y="105" font-family="sans-serif" font-size="10" fill="#A32D2D" font-weight="500">→ Pythium, raíces marrones</text></g>

<g transform="translate(450, 210)"><rect x="0" y="0" width="195" height="125" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.4"/><circle cx="30" cy="30" r="15" fill="#A32D2D"/><text x="30" y="36" font-family="serif" font-size="16" fill="#F5F1E8" text-anchor="middle" font-weight="500">6</text><text x="55" y="36" font-family="sans-serif" font-size="12" fill="#1A1A1A" font-weight="500">Sembrar mal</text><text x="20" y="65" font-family="sans-serif" font-size="10" fill="#5F5E5A">Semillas viejas, sustrato</text><text x="20" y="80" font-family="sans-serif" font-size="10" fill="#5F5E5A">no preparado, agua dura</text><text x="20" y="105" font-family="sans-serif" font-size="10" fill="#A32D2D" font-weight="500">→ Germinación irregular</text></g>

<g transform="translate(245, 345)"><rect x="0" y="0" width="195" height="125" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.4"/><circle cx="30" cy="30" r="15" fill="#A32D2D"/><text x="30" y="36" font-family="serif" font-size="16" fill="#F5F1E8" text-anchor="middle" font-weight="500">7</text><text x="55" y="36" font-family="sans-serif" font-size="12" fill="#1A1A1A" font-weight="500">No prestar atención</text><text x="20" y="65" font-family="sans-serif" font-size="10" fill="#5F5E5A">Dejar el sistema en piloto</text><text x="20" y="80" font-family="sans-serif" font-size="10" fill="#5F5E5A">automático sin revisar</text><text x="20" y="105" font-family="sans-serif" font-size="10" fill="#A32D2D" font-weight="500">→ Cuando ves el problema, ya es tarde</text></g>
</svg>