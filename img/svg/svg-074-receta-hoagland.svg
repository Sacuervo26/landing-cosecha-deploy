<?xml version="1.0" encoding="UTF-8"?>
<svg width="100%" viewBox="0 0 680 380" role="img" xmlns="http://www.w3.org/2000/svg"><title>Receta Hoagland modificada · 100 litros</title>
<text x="340" y="35" font-family="serif" font-size="17" fill="#1A1A1A" text-anchor="middle" font-weight="500">Receta Hoagland modificada · 100 litros</text>
<text x="340" y="55" font-family="sans-serif" font-size="11" fill="#5F5E5A" text-anchor="middle" font-style="italic">La fórmula universal que usa el 80% del mundo hidropónico</text>
<g transform="translate(40, 75)"><rect x="0" y="0" width="290" height="130" rx="8" fill="#F5F1E8" stroke="#2D5F3F" stroke-width="0.4"/><text x="145" y="35" font-family="serif" font-size="14" fill="#2D5F3F" text-anchor="middle" font-weight="500">Macronutrientes (parte A)</text><text x="145" y="55" font-family="sans-serif" font-size="10" fill="#5F5E5A" text-anchor="middle">Nitrato de calcio: 95g</text><text x="145" y="71" font-family="sans-serif" font-size="10" fill="#5F5E5A" text-anchor="middle">Nitrato de potasio: 25g</text><text x="145" y="87" font-family="sans-serif" font-size="10" fill="#5F5E5A" text-anchor="middle">para 100L agua</text><text x="145" y="118" font-family="sans-serif" font-size="11" fill="#27500A" text-anchor="middle" font-weight="500">~$8</text></g><g transform="translate(350, 75)"><rect x="0" y="0" width="290" height="130" rx="8" fill="#F5F1E8" stroke="#2D5F3F" stroke-width="0.4"/><text x="145" y="35" font-family="serif" font-size="14" fill="#2D5F3F" text-anchor="middle" font-weight="500">Macronutrientes (parte B)</text><text x="145" y="55" font-family="sans-serif" font-size="10" fill="#5F5E5A" text-anchor="middle">Sulfato magnesio: 50g</text><text x="145" y="71" font-family="sans-serif" font-size="10" fill="#5F5E5A" text-anchor="middle">Fosfato monopotásico: 14g</text><text x="145" y="87" font-family="sans-serif" font-size="10" fill="#5F5E5A" text-anchor="middle">Sulfato de potasio: 14g</text><text x="145" y="118" font-family="sans-serif" font-size="11" fill="#27500A" text-anchor="middle" font-weight="500">~$10</text></g><g transform="translate(40, 220)"><rect x="0" y="0" width="290" height="130" rx="8" fill="#F5F1E8" stroke="#2D5F3F" stroke-width="0.4"/><text x="145" y="35" font-family="serif" font-size="14" fill="#2D5F3F" text-anchor="middle" font-weight="500">Micronutrientes</text><text x="145" y="55" font-family="sans-serif" font-size="10" fill="#5F5E5A" text-anchor="middle">Quelato de hierro: 5g</text><text x="145" y="71" font-family="sans-serif" font-size="10" fill="#5F5E5A" text-anchor="middle">Mezcla micros: 1.5g</text><text x="145" y="87" font-family="sans-serif" font-size="10" fill="#5F5E5A" text-anchor="middle">incluye Mn, Zn, B, Cu, Mo</text><text x="145" y="118" font-family="sans-serif" font-size="11" fill="#27500A" text-anchor="middle" font-weight="500">~$15</text></g><g transform="translate(350, 220)"><rect x="0" y="0" width="290" height="130" rx="8" fill="#F5F1E8" stroke="#2D5F3F" stroke-width="0.4"/><text x="145" y="35" font-family="serif" font-size="14" fill="#2D5F3F" text-anchor="middle" font-weight="500">Procedimiento</text><text x="145" y="55" font-family="sans-serif" font-size="10" fill="#5F5E5A" text-anchor="middle">Disolver A en 50L agua</text><text x="145" y="71" font-family="sans-serif" font-size="10" fill="#5F5E5A" text-anchor="middle">Disolver B en otros 50L</text><text x="145" y="87" font-family="sans-serif" font-size="10" fill="#5F5E5A" text-anchor="middle">Mezclar y ajustar pH</text><text x="145" y="118" font-family="sans-serif" font-size="11" fill="#27500A" text-anchor="middle" font-weight="500">5 min</text></g>
</svg>