<?xml version="1.0" encoding="UTF-8"?>
<svg width="100%" viewBox="0 0 680 440" role="img" xmlns="http://www.w3.org/2000/svg"><title>Tu plan de los próximos 90 días</title>
<text x="340" y="35" font-family="serif" font-size="17" fill="#1A1A1A" text-anchor="middle" font-weight="500">Tu plan de los próximos 90 días</text>
<text x="340" y="55" font-family="sans-serif" font-size="11" fill="#5F5E5A" text-anchor="middle" font-style="italic">El cronograma realista para llegar a tu primera venta</text>
<rect x="40" y="75" width="600" height="350" rx="10" fill="#F5F1E8" stroke="#2D5F3F" stroke-width="0.5"/><text x="340" y="105" font-family="serif" font-size="14" fill="#2D5F3F" text-anchor="middle" font-weight="500">Tu plan de los próximos 90 días</text><line x1="100" y1="120" x2="580" y2="120" stroke="#C9A961" stroke-width="0.5"/><rect x="60" y="140" width="120" height="44" rx="6" fill="#7BA05B" opacity="0.85"/><text x="120" y="160" font-family="sans-serif" font-size="11" fill="#F5F1E8" text-anchor="middle" font-weight="500">Días 1-7</text><text x="120" y="176" font-family="sans-serif" font-size="10" fill="#F5F1E8" text-anchor="middle">Lee y planifica</text><text x="200" y="168" font-family="sans-serif" font-size="11" fill="#5F5E5A">Compra materiales, identifica ubicación, prepara semillas</text><rect x="60" y="195" width="120" height="44" rx="6" fill="#2D5F3F" opacity="0.85"/><text x="120" y="215" font-family="sans-serif" font-size="11" fill="#F5F1E8" text-anchor="middle" font-weight="500">Días 8-14</text><text x="120" y="231" font-family="sans-serif" font-size="10" fill="#F5F1E8" text-anchor="middle">Construye Kratky</text><text x="200" y="223" font-family="sans-serif" font-size="11" fill="#5F5E5A">Tu primer sistema simple. Valida tu interés.</text><rect x="60" y="250" width="120" height="44" rx="6" fill="#C9A961" opacity="0.85"/><text x="120" y="270" font-family="sans-serif" font-size="11" fill="#F5F1E8" text-anchor="middle" font-weight="500">Días 15-30</text><text x="120" y="286" font-family="sans-serif" font-size="10" fill="#F5F1E8" text-anchor="middle">Construye DWC</text><text x="200" y="278" font-family="sans-serif" font-size="11" fill="#5F5E5A">Sistema definitivo. 6 plantas. Rutina semanal.</text><rect x="60" y="305" width="120" height="44" rx="6" fill="#854F0B" opacity="0.85"/><text x="120" y="325" font-family="sans-serif" font-size="11" fill="#F5F1E8" text-anchor="middle" font-weight="500">Días 31-60</text><text x="120" y="341" font-family="sans-serif" font-size="10" fill="#F5F1E8" text-anchor="middle">Optimiza y escala</text><text x="200" y="333" font-family="sans-serif" font-size="11" fill="#5F5E5A">NFT con 21 plantas. Aprende de fallas.</text><rect x="60" y="360" width="120" height="44" rx="6" fill="#1A1A1A" opacity="0.85"/><text x="120" y="380" font-family="sans-serif" font-size="11" fill="#F5F1E8" text-anchor="middle" font-weight="500">Días 61-90</text><text x="120" y="396" font-family="sans-serif" font-size="10" fill="#F5F1E8" text-anchor="middle">Primera venta</text><text x="200" y="388" font-family="sans-serif" font-size="11" fill="#5F5E5A">20 lechugas para vecinos. Valida modelo de negocio.</text>
</svg>